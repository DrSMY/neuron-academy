    <button class="entrance-skip" type="button">Skip</button>

  <script>
    (function () {
      var el = document.getElementById('entrance');
      var video = el.querySelector('.entrance-video');
      var dismissed = true;
      var hardTimeout = null;

      function dismiss() {
        if (dismissed) return;
        dismissed = true;
        el.classList.add('hide');
        if (hardTimeout) { clearTimeout(hardTimeout); hardTimeout = null; }
      }
      function play() {
        if (!dismissed) return;
        dismissed = false;
        el.classList.remove('hide', 'show-brand');
        video.currentTime = 0;
        if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
          el.classList.add('show-brand');
          hardTimeout = setTimeout(dismiss, 2200);
          return;
        }
        video.play().catch(function () {
          // autoplay blocked (browser policy) — still give the brand its moment, then continue
          if (hardTimeout) clearTimeout(hardTimeout);
          el.classList.add('show-brand');
          hardTimeout = setTimeout(dismiss, 2200);
        });
        hardTimeout = setTimeout(dismiss, 12000);
      }
      video.addEventListener('ended', dismiss);
      video.addEventListener('error', dismiss);
      video.addEventListener('timeupdate', function () {
        if (video.duration && video.currentTime >= video.duration - 3) el.classList.add('show-brand');
      });
      el.querySelector('.entrance-skip').addEventListener('click', dismiss);
      el.addEventListener('click', function (e) { if (e.target === el || e.target.classList.contains('entrance-scrim')) dismiss(); });
      document.addEventListener('keydown', function (e) {
        if (!dismissed && (e.key === 'Escape' || e.key === 'Enter' || e.key === ' ')) dismiss();
      });
      window.replayEntrance = play;

      var seen = localStorage.getItem('ns-seen-intro');
      var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!seen && !reduced) {
        localStorage.setItem('ns-seen-intro', '1');
        play();
      }
    })();
  </script>
