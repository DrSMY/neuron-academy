<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify certificate — NeuroSeed</title>
  <script>
    (function () {
      var t = localStorage.getItem('na-theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="ambient" aria-hidden="true"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  <div class="auth-wrap">
    <div class="card auth-card" style="max-width:480px">
      <div class="brand" style="justify-content:center;margin-bottom:6px">
        <span class="logo"><svg viewBox="0 0 48 48" aria-hidden="true"><defs><linearGradient id="nsTile" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#141b2e"/><stop offset="1" stop-color="#090c16"/></linearGradient><linearGradient id="nsGold" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#D6B36A"/><stop offset="0.55" stop-color="#E8C67F"/><stop offset="1" stop-color="#FFE8A9"/></linearGradient><radialGradient id="nsGlow" cx="0.5" cy="0.6" r="0.5"><stop offset="0" stop-color="#FFE8A9" stop-opacity="0.38"/><stop offset="1" stop-color="#FFE8A9" stop-opacity="0"/></radialGradient></defs><rect width="48" height="48" rx="13" fill="url(#nsTile)"/><circle cx="24" cy="27" r="15" fill="url(#nsGlow)"/><g stroke="url(#nsGold)" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M24 36C24 31 24 28 24 24"/><path d="M24 36C24 39.5 24 41.5 24 44.5"/><path d="M24 36C21.5 38.5 19 39.5 15.5 43"/><path d="M24 36C26.5 38.5 29 39.5 32.5 43"/><path d="M24 24C24 19 24 15 24 9.5"/><path d="M24 24C20.5 21.8 17.5 20 13.5 17"/><path d="M24 21.5C19.5 18.5 16 15 12.3 10.8"/><path d="M24 22.5C21.5 20 19 18 16.7 15.3"/><path d="M24 24C27.5 21.8 30.5 20 34.5 17"/><path d="M24 21.5C28.5 18.5 32 15 35.7 10.8"/><path d="M24 22.5C26.5 20 29 18 31.3 15.3"/></g><g fill="url(#nsGold)"><circle cx="24" cy="9.5" r="2.1"/><circle cx="13.5" cy="17" r="1.7"/><circle cx="12.3" cy="10.8" r="1.6"/><circle cx="16.7" cy="15.3" r="1.4"/><circle cx="34.5" cy="17" r="1.7"/><circle cx="35.7" cy="10.8" r="1.6"/><circle cx="31.3" cy="15.3" r="1.4"/><circle cx="24" cy="24" r="1.5" fill="#FFE8A9"/></g></svg></span>
        NeuroSeed
      </div>
      <p class="tagline">Certificate verification</p>
      <form id="verify-form" novalidate>
        <div class="field">
          <label for="v-code">Certificate number</label>
          <input id="v-code" placeholder="NA-XXXXXXXXXX" autocomplete="off">
        </div>
        <button class="btn btn-primary" style="width:100%" type="submit">Verify</button>
      </form>
      <div id="verify-result" style="margin-top:20px"></div>
      <p class="auth-note"><a href="/" style="color:var(--accent-bright)">Back to NeuroSeed</a></p>
    </div>
  </div>
  <script>
    const form = document.getElementById('verify-form');
    const input = document.getElementById('v-code');
    const out = document.getElementById('verify-result');
    async function check(code) {
      out.innerHTML = '<p style="color:var(--fg-muted);font-size:14px">Checking…</p>';
      try {
        const res = await fetch('/api/verify/' + encodeURIComponent(code.trim()));
        const d = await res.json();
        if (!d.valid) {
          out.innerHTML = '<div class="form-error show">✕ &nbsp;' + (d.error || 'Invalid certificate code.') + '</div>';
          return;
        }
        out.innerHTML = `
          <div class="score-banner pass" style="display:block;padding:18px 22px">
            <strong style="color:var(--success)">✓ Valid certificate</strong>
            <p style="margin:10px 0 0;color:var(--fg)"><strong>${d.name}</strong> completed<br>
            <span style="color:var(--accent-bright)">${d.module}</span></p>
            <p style="margin:8px 0 0;font-size:13px;color:var(--fg-muted)">Issued ${d.issued_at} · ${d.code}</p>
          </div>`;
      } catch {
        out.innerHTML = '<div class="form-error show">Something went wrong — try again.</div>';
      }
    }
    form.onsubmit = (e) => { e.preventDefault(); if (input.value.trim()) check(input.value); };
    const qs = new URLSearchParams(location.search).get('code');
    if (qs) { input.value = qs; check(qs); }
  </script>
</body>
</html>
