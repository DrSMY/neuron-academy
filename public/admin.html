<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — NeuroSeed</title>
  <script>
    (function () {
      var t = localStorage.getItem('na-theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" type="image/png" href="/assets/favicon-dark.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" href="/assets/favicon-light.png" media="(prefers-color-scheme: light)">
</head>
<body>
  <div id="entrance" class="entrance-splash hide">
    <video class="entrance-video" src="/assets/entrance.mp4" poster="/assets/entrance-poster.svg" muted playsinline preload="none"></video>
    <div class="entrance-scrim" aria-hidden="true"></div>
    <div class="entrance-brand">
      <span class="entrance-logo"><img src="/assets/logo-dark.png" alt="NeuroSeed" aria-hidden="true"></span>
      <span class="entrance-word">NeuroSeed</span>
      <span class="entrance-tag">Growth From Within</span>
    </div>
    <button class="entrance-skip" type="button">Skip</button>
  </div>
  <script>
    (function () {
      var el = document.getElementById('entrance');
      var video = el.querySelector('.entrance-video');
      var dismissed = true;
      var hardTimeout = null;

      function dismiss() {
        if (dismissed) return;
        dismissed = true;
        el.classList.add('hide');
        if (hardTimeout) { clearTimeout(hardTimeout); hardTimeout = null; }
      }
      function play() {
        if (!dismissed) return;
        dismissed = false;
        el.classList.remove('hide', 'show-brand');
        video.currentTime = 0;
        if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
          el.classList.add('show-brand');
          hardTimeout = setTimeout(dismiss, 2200);
          return;
        }
        video.play().catch(function () {
          el.classList.add('show-brand');
          hardTimeout = setTimeout(dismiss, 2200);
        });
        hardTimeout = setTimeout(dismiss, 12000);
      }
      video.addEventListener('ended', dismiss);
      video.addEventListener('error', dismiss);
      video.addEventListener('timeupdate', function () {
        if (video.duration && video.currentTime >= video.duration - 3) el.classList.add('show-brand');
      });
      el.querySelector('.entrance-skip').addEventListener('click', dismiss);
      el.addEventListener('click', function (e) { if (e.target === el || e.target.classList.contains('entrance-scrim')) dismiss(); });
      document.addEventListener('keydown', function (e) {
        if (!dismissed && (e.key === 'Escape' || e.key === 'Enter' || e.key === ' ')) dismiss();
      });
      window.replayEntrance = play;
    })();
  </script>

  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div class="bg-tree" aria-hidden="true">
    <img class="for-dark" src="/assets/watermark-dark.png" alt="">
    <img class="for-light" src="/assets/watermark-light.png" alt="">
  </div>

  <div id="app"></div>

  <div class="toast-stack" id="toasts" aria-live="polite"></div>

  <div class="modal-scrim" id="modal-scrim">
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
